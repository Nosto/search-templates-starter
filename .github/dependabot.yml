version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    groups:
      patch-and-minor-updates:
        update-types:
          - "patch"
          - "minor"
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@types/eslint-*"
      semantic-release:
        patterns:
          - "@semantic-release/*"
          - "semantic-release"
      vitest:
        patterns:
          - "vitest"
      stylelint:
        patterns:
          - "stylelint"
          - "stylelint-*"
      commitlint:
        patterns:
          - "@commitlint/*"
